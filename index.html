<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive OS Analyzer</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        /* アニメーション用のカスタムクラス */
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(3rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-sky-500/30 pb-24 min-h-screen">

    <!-- Header / Type Selector -->
    <header class="pt-16 pb-16 px-6 text-center max-w-5xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white mb-4">
            Cognitive OS Analyzer
        </h1>
        <p class="text-lg text-slate-400 mb-10 leading-relaxed">
            MBTIの4文字に隠された、情報の「知覚」と「判断」のメカニズム。<br class="hidden md:block"/>
            ユングの8つの認知機能から、あなたの心のオペレーティングシステムを解読します。<br/>
            以下の16タイプから1つを選択してください。
        </p>
        
        <div id="type-selector-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- ボタンはJavaScriptで生成されます -->
        </div>
    </header>

    <!-- Result Dashboard -->
    <main id="dashboard-container" class="max-w-6xl mx-auto px-6 hidden">
        <!-- ダッシュボードの中身はJavaScriptで生成されます -->
    </main>

    <script>
        // --- カラーテーマ定義 ---
        const themeColors = {
            purple: {
                group: "分析家",
                btnDefault: "bg-slate-900/80 border-purple-900/50 text-purple-400 hover:bg-purple-900/40 hover:border-purple-500/50",
                btnSelected: "bg-purple-500/20 border-purple-400 text-purple-100 shadow-[0_0_25px_rgba(168,85,247,0.4)] transform scale-105",
                text: "text-purple-400",
                bgLight: "bg-purple-500/10",
                border: "border-purple-500/30",
                gradient: "from-purple-900/20 to-slate-900"
            },
            emerald: {
                group: "外交官",
                btnDefault: "bg-slate-900/80 border-emerald-900/50 text-emerald-400 hover:bg-emerald-900/40 hover:border-emerald-500/50",
                btnSelected: "bg-emerald-500/20 border-emerald-400 text-emerald-100 shadow-[0_0_25px_rgba(16,185,129,0.4)] transform scale-105",
                text: "text-emerald-400",
                bgLight: "bg-emerald-500/10",
                border: "border-emerald-500/30",
                gradient: "from-emerald-900/20 to-slate-900"
            },
            cyan: {
                group: "番人",
                btnDefault: "bg-slate-900/80 border-cyan-900/50 text-cyan-400 hover:bg-cyan-900/40 hover:border-cyan-500/50",
                btnSelected: "bg-cyan-500/20 border-cyan-400 text-cyan-100 shadow-[0_0_25px_rgba(6,182,212,0.4)] transform scale-105",
                text: "text-cyan-400",
                bgLight: "bg-cyan-500/10",
                border: "border-cyan-500/30",
                gradient: "from-cyan-900/20 to-slate-900"
            },
            yellow: {
                group: "探検家",
                btnDefault: "bg-slate-900/80 border-yellow-900/50 text-yellow-400 hover:bg-yellow-900/40 hover:border-yellow-500/50",
                btnSelected: "bg-yellow-500/20 border-yellow-400 text-yellow-100 shadow-[0_0_25px_rgba(234,179,8,0.4)] transform scale-105",
                text: "text-yellow-400",
                bgLight: "bg-yellow-500/10",
                border: "border-yellow-500/30",
                gradient: "from-yellow-900/20 to-slate-900"
            }
        };

        // --- データ定義 ---
        const profiles = {
            INTJ: { name: "建築家", color: "purple", desc: "すべてを計画し、完璧を求める戦略家。常に「より良い方法」を模索し、論理と洞察を武器に目標を達成します。" },
            INTP: { name: "論理学者", color: "purple", desc: "独自の論理と好奇心で真理を追求する探求者。宇宙の法則から日常の疑問まで、物事の根本的な仕組みを理解しようとします。" },
            ENTJ: { name: "指揮官", color: "purple", desc: "合理性とカリスマで組織を牽引するリーダー。目標達成のためなら困難を恐れず、効率的なシステムを構築して周囲を動かします。" },
            ENTP: { name: "討論者", color: "purple", desc: "知的な議論と新しい可能性を愛する挑戦者。既存のルールを疑い、斬新なアイデアと鋭い弁舌で世界に刺激を与えます。" },
            INFJ: { name: "提唱者", color: "emerald", desc: "深い洞察力で人々の理想を導く導き手。静かですが内に秘めた情熱は熱く、人々の心の本質を見抜き、世界をより良くしようと尽力します。" },
            INFP: { name: "仲介者", color: "emerald", desc: "内なる価値観と深い共感力を持つ理想主義者。非常に優しく想像力豊かで、他者の痛みに寄り添いながら「自分らしさ」を大切にします。" },
            ENFJ: { name: "主人公", color: "emerald", desc: "人々の情熱を引き出し、共に歩むリーダー。圧倒的な共感力とカリスマ性で人々を励まし、全体の調和と成長をサポートします。" },
            ENFP: { name: "広報運動家", color: "emerald", desc: "情熱と想像力で人々を巻き込む自由人。持ち前の明るさと無限のアイデアで、周囲を鼓舞しながら新しい可能性を追求します。" },
            ISTJ: { name: "管理者", color: "cyan", desc: "事実と責任を重んじる実直な守護者。ルールや伝統を守り、一度引き受けた仕事は最後まで正確に、着実にやり遂げます。" },
            ISFJ: { name: "擁護者", color: "cyan", desc: "周囲への献身と温かい心を持つ支援者。控えめですが非常に面倒見が良く、大切な人々を守り、穏やかな日常を支え続けます。" },
            ESTJ: { name: "幹部", color: "cyan", desc: "秩序と効率を重んじ、物事を確実に実行する推進者。現実的で地に足が着いており、ルールに基づきチームを効率的にまとめ上げます。" },
            ESFJ: { name: "領事", color: "cyan", desc: "調和を大切にし、人々の世話を焼く人気者。常に周囲のニーズに気を配り、みんなが笑顔でいられる温かいコミュニティを築きます。" },
            ISTP: { name: "巨匠", color: "yellow", desc: "冷静な観察眼と実践的な技術を持つ職人。独立心が強く、状況を冷静に分析して、手元にある道具で瞬時に問題を解決します。" },
            ISFP: { name: "冒険家", color: "yellow", desc: "柔軟な感性と美意識で今を生きる芸術家。平和を愛し、自分の五感や感情に素直に従いながら、美しいものや楽しい瞬間を味わいます。" },
            ESTP: { name: "起業家", color: "yellow", desc: "エネルギッシュにリスクを楽しみ、行動する実践者。ルールに縛られず、持ち前の度胸と瞬発力で目の前のチャンスを掴み取ります。" },
            ESFP: { name: "エンターテイナー", color: "yellow", desc: "持ち前の明るさで今この瞬間を楽しむ天才。周囲をパッと華やかにし、人を楽しませながら自分自身も人生を全力で謳歌します。" }
        };

        const functionDetails = {
            Se: { name: "外向的感覚", icon: "eye", color: "text-yellow-400", bg: "bg-yellow-400/20", border: "border-yellow-400/50",
                    desc: "五感で「今ここ」の現実をありのままに捉え、瞬時に適応する機能。瞬発力があり、体を動かしたり、実際に体験したりすることを好みます。新しい環境への適応力が非常に高いです。", 
                    bad: "衝動的で無計画な行動や、刹那的な快楽（暴飲暴食や浪費、過度な遊びなど）に走り、後先考えずにリスクを取ってしまう。" },
            Si: { name: "内向的感覚", icon: "database", color: "text-emerald-400", bg: "bg-emerald-400/20", border: "border-emerald-400/50",
                    desc: "過去の経験や記憶、自分の中に蓄積されたデータと現在の状況を照らし合わせる機能。ルーティンや伝統を重んじ、慎重で正確。一度覚えた手順を忠実に再現するのが得意です。", 
                    bad: "過去の失敗や些細な記憶、人に言われた言葉に過剰に囚われ、ネガティブな反芻を繰り返して新しい変化を極度に恐れる。" },
            Ne: { name: "外向的直観", icon: "lightbulb", color: "text-orange-400", bg: "bg-orange-400/20", border: "border-orange-400/50",
                    desc: "外界からヒントを得て、「もしこうだったら？」「こんな可能性もある」とアイデアを無限に広げる機能。好奇心旺盛で、物事の裏側にある関連性を見つけ出すブレインストーミングが得意です。", 
                    bad: "「もしあの発言で嫌われたら」「全部失敗したらどうしよう」と、まだ起きていない最悪のシナリオを次々と連想し、過剰な不安と妄想に陥る。" },
            Ni: { name: "内向的直観", icon: "target", color: "text-purple-400", bg: "bg-purple-400/20", border: "border-purple-400/50",
                    desc: "無意識の内に複数の情報から本質を抽出し、「最終的にこうなる」という一つのビジョンや未来を予測する機能。長期的な視点を持ち、突然の「ひらめき」によって本質を見抜く力に優れます。", 
                    bad: "証拠もないのに「みんな裏で悪口を言っている」「絶対に悪いことが起きる」と、パラノイア（妄想的な悲観）に陥り、世界に絶望する。" },
            Te: { name: "外向的思考", icon: "settings", color: "text-blue-400", bg: "bg-blue-400/20", border: "border-blue-400/50",
                    desc: "客観的な事実やデータ、社会的なルールに基づき、効率的・合理的に物事を判断する機能。目標達成のために仕組みを作ったり、物事を体系化して周囲を動かすリーダーシップに優れます。", 
                    bad: "他者の感情や思いやりを完全に無視し、「ルールだから」「効率が悪い」と冷徹に割り切り、理屈で相手を厳しく責め立てたり支配的になったりする。" },
            Ti: { name: "内向的思考", icon: "cpu", color: "text-cyan-400", bg: "bg-cyan-400/20", border: "border-cyan-400/50",
                    desc: "自分の中の論理的な整合性や、「なぜそうなるのか？」という本質的な原理原則を深く追求する機能。物事の構造を分析し、矛盾のない独自の論理体系を築き上げることを好みます。", 
                    bad: "他者の意見や感情的な訴えを一切聞き入れず、自分の頭の中だけの極端な理屈や批判的思考に固執し、周囲を見下してしまう。" },
            Fe: { name: "外向的感情", icon: "users", color: "text-pink-400", bg: "bg-pink-400/20", border: "border-pink-400/50",
                    desc: "他者の感情や、その場の空気、集団全体の調和を最も重要な判断基準にする機能。共感力が高く、誰もが納得し、平和で友好的な環境を作るために尽力します。", 
                    bad: "他人の目や評価を過剰に気にしすぎたり、自分を犠牲にしすぎた結果、溜め込んだ不満を周囲に感情的に八つ当たりしてしまう。" },
            Fi: { name: "内向的感情", icon: "heart", color: "text-rose-400", bg: "bg-rose-400/20", border: "border-rose-400/50",
                    desc: "自分の心の中にある確固たる価値観、倫理観、「自分がどう感じるか」を基準にする機能。自分らしさを非常に大切にし、他者の個性や感情の機微に対しても深く寄り添うことができます。", 
                    bad: "「誰も自分を分かってくれない」と被害妄想に陥り、自らの殻に閉じこもって、周囲に対して極度に感情的かつ排他的になる。" }
        };

        // --- 状態管理 ---
        let selectedType = null;

        // --- ロジック関数 ---
        const getCognitiveStack = (type) => {
            const [e_i, s_n, t_f, j_p] = type.split("");
            
            const extFunc = j_p === 'J' ? `${t_f}e` : `${s_n}e`;
            const introFunc = j_p === 'J' ? `${s_n}i` : `${t_f}i`;

            const func1 = e_i === 'E' ? extFunc : introFunc;
            const func2 = e_i === 'E' ? introFunc : extFunc;

            const func3_base = func2[0] === 'S' ? 'N' : func2[0] === 'N' ? 'S' : func2[0] === 'T' ? 'F' : 'T';
            const func3_dir = func2[1] === 'e' ? 'i' : 'e';
            const func3 = `${func3_base}${func3_dir}`;

            const func4_base = func1[0] === 'S' ? 'N' : func1[0] === 'N' ? 'S' : func1[0] === 'T' ? 'F' : 'T';
            const func4_dir = func1[1] === 'e' ? 'i' : 'e';
            const func4 = `${func4_base}${func4_dir}`;

            return [func1, func2, func3, func4];
        };

        // --- レンダリング関数 ---
        
        // ヘッダーボタンの描画
        function renderHeader() {
            const grid = document.getElementById('type-selector-grid');
            let html = '';
            
            for (const [type, data] of Object.entries(profiles)) {
                const isSelected = selectedType === type;
                const tColor = themeColors[data.color];
                const btnClass = isSelected ? tColor.btnSelected : tColor.btnDefault;
                
                html += `
                    <button onclick="handleSelect('${type}')" class="p-6 rounded-2xl border-2 transition-all duration-300 flex flex-col items-center justify-center gap-2 ${btnClass}">
                        <span class="text-xs font-bold uppercase tracking-widest opacity-60 mb-1">${tColor.group}</span>
                        <span class="text-4xl md:text-5xl font-black font-mono tracking-widest">${type}</span>
                        <span class="text-sm md:text-base font-bold mt-1">${data.name}</span>
                    </button>
                `;
            }
            grid.innerHTML = html;
        }

        // 機能スタックブロックのHTML生成
        function getStackBlockHTML(func, level, role, width, opacity = "opacity-100", isPrimary = false) {
            const data = functionDetails[func];
            const primaryShadow = isPrimary ? 'shadow-[0_0_20px_rgba(255,255,255,0.05)]' : '';
            return `
                <div class="${width} ${opacity} transition-all duration-300 hover:opacity-100 group">
                    <div class="flex flex-col md:flex-row items-start md:items-stretch gap-6 p-6 rounded-[1.5rem] border ${data.bg} ${data.border} backdrop-blur-sm shadow-lg">
                        <div class="flex items-center justify-center w-20 h-20 md:w-24 md:h-24 rounded-2xl bg-slate-950 border ${data.border} shrink-0 ${primaryShadow}">
                            <i data-lucide="${data.icon}" class="w-10 h-10 md:w-12 md:h-12 ${data.color}"></i>
                        </div>
                        <div class="flex-1 flex flex-col justify-center">
                            <div class="flex flex-wrap items-baseline gap-3 mb-2">
                                <span class="text-2xl md:text-3xl font-black font-mono tracking-wider ${data.color}">${func}</span>
                                <span class="text-lg md:text-xl font-bold text-white">${data.name}</span>
                                <span class="text-xs font-bold text-slate-400 md:ml-auto bg-slate-950 px-3 py-1 rounded-full uppercase tracking-widest">${level}</span>
                            </div>
                            <p class="text-sm text-slate-400 font-medium mb-2 border-b border-slate-800/50 pb-2">
                                <span class="text-slate-500 mr-2">役割:</span>${role}
                            </p>
                            <p class="text-base text-slate-300 leading-relaxed font-medium">
                                ${data.desc}
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        // ミニバッジのHTML生成
        function getFuncBadgeHTML(func, highlight = false) {
            const data = functionDetails[func];
            const stateClass = highlight ? `${data.bg} ${data.border} ring-2 ring-white/20` : `bg-slate-900 border-slate-800 opacity-60 grayscale`;
            const colorClass = highlight ? data.color : 'text-slate-500';
            
            return `
                <div class="flex flex-col items-center justify-center rounded-2xl border w-20 h-20 text-xl shadow-lg transition-all ${stateClass}">
                    <span class="font-black font-mono ${colorClass}">${func}</span>
                </div>
            `;
        }

        // ダッシュボード全体の描画
        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            if (!selectedType) {
                container.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            const profile = profiles[selectedType];
            const stack = getCognitiveStack(selectedType);
            const [f1, f2, f3, f4] = stack;
            const tColor = themeColors[profile.color];

            const J_or_P = selectedType[3];
            const E_or_I = selectedType[0];
            const outerFaceFunc = E_or_I === 'E' ? f1 : f2;
            
            // J/P Explanation logic
            const jpExplanationText = J_or_P === 'J' 
                ? `あなたは「J（判断的態度）」を持っています。そのため、外界との接点においては【判断機能（TまたはF）】を使用し、物事を整理して計画を立て、早く決着をつけてスッキリしたいと考えます。`
                : `あなたは「P（知覚的態度）」を持っています。そのため、外界との接点においては【知覚機能（SまたはN）】を使用し、情報を常に受け入れておきたいため、ギリギリまで結論を保留し柔軟に対応したいと考えます。`;

            // E/I Explanation logic
            const eiExplanationText = E_or_I === 'E' 
                ? `したがって、外に向けている顔（${f1}）がそのまま「主機能」となります。思っていることと行動が直結しやすいタイプです。`
                : `したがって、外に向けている顔（${f2}）はあくまで「補助機能」にすぎず、一番大切な「主機能」は心の奥底に隠された（${f1}）となります。`;

            // Loop explanation logic
            const loopExplanationText = E_or_I === 'I'
                ? `外部との接点を絶ち、内なる「${functionDetails[f1].name}」の感情や論理だけで完結し、未熟な「${functionDetails[f3].name}」の枠組み（過去の失敗記憶や極端な直観など）を使って無限にネガティブな反芻を繰り返し、自己嫌悪に陥ります。`
                : `立ち止まって内省することを避け、「${functionDetails[f1].name}」の衝動のままに外部の刺激や行動を求め続けます。その際、未熟な「${functionDetails[f3].name}」を用いて強引に物事を押し進めようとするため、周囲と衝突したり空回りしたりします。`;

            container.innerHTML = `
                <div class="space-y-10 animate-in">
                    <!-- Section 1: Profile Summary -->
                    <section class="bg-gradient-to-br ${tColor.gradient} border border-slate-800 rounded-[2rem] p-8 md:p-14 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-8 md:p-12 opacity-[0.03] pointer-events-none">
                            <span class="text-[180px] font-black font-mono leading-none">${selectedType}</span>
                        </div>
                        <div class="relative z-10">
                            <h2 class="${tColor.text} font-bold tracking-widest uppercase text-sm mb-3">Section 1: Basic Profile</h2>
                            <div class="flex flex-col md:flex-row items-baseline gap-4 md:gap-6 mb-6">
                                <h3 class="text-6xl md:text-7xl font-black font-mono tracking-tight text-white drop-shadow-lg">
                                    ${selectedType}
                                </h3>
                                <span class="text-3xl md:text-4xl font-bold text-slate-200">${profile.name}</span>
                            </div>
                            <p class="text-xl md:text-2xl text-slate-300 leading-relaxed max-w-4xl font-medium">
                                ${profile.desc}
                            </p>
                        </div>
                    </section>

                    <!-- Section 2: Cognitive Stack Breakdown -->
                    <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8 md:p-12 relative overflow-hidden">
                        <h2 class="${tColor.text} font-bold tracking-widest uppercase text-sm mb-6 flex items-center gap-2">
                            <i data-lucide="database" class="w-5 h-5"></i> Section 2: Cognitive Stack Breakdown
                        </h2>
                        <p class="text-slate-300 text-lg mb-10 max-w-4xl leading-relaxed">
                            上記の仕組みによって導き出された、あなたの情報処理の優先順位（スタック）です。上の機能ほど息をするように自然に使いこなし、性格の核となります。下に行くほど意識的なエネルギーを必要とし、弱点にもなり得ます。
                        </p>
                        
                        <div class="flex flex-col items-center gap-4">
                            ${getStackBlockHTML(f1, "1st / 主機能", "メインエンジン。あなたの性格の核であり、最も自然に、無意識レベルで使いこなす機能です。", "w-full", "opacity-100", true)}
                            ${getStackBlockHTML(f2, "2nd / 補助機能", "サポート役。主機能を補い、外界と内界のバランスを取るための羅針盤として働きます。", "w-[95%] md:w-[90%]")}
                            ${getStackBlockHTML(f3, "3rd / 代替機能", "リラックス・成長。年齢を重ねたり、上位の機能が疲れた時に使われ、普段とは違う視点を与えてくれます。", "w-[90%] md:w-[80%]", "opacity-90")}
                            ${getStackBlockHTML(f4, "4th / 劣等機能", "アキレス腱。最も苦手とし、強いストレスを感じる領域ですが、ここを受け入れることが最大の成長に繋がります。", "w-[85%] md:w-[70%]", "opacity-70")}
                        </div>
                    </section>

                    <!-- Section 3 & 4 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        <!-- Section 3: Outer Face & Logic Switch -->
                        <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8 relative overflow-hidden">
                            <h2 class="${tColor.text} font-bold tracking-widest uppercase text-sm mb-6 flex items-center gap-2">
                                <i data-lucide="git-merge" class="w-5 h-5"></i> Section 3: OS Logic Switch
                            </h2>
                            <p class="text-slate-300 text-base mb-8 leading-relaxed">
                                MBTIの4文字は単なる性格のラベルではなく、心の中で機能がどう連携しているかを示す暗号です。<br/>
                                特に<strong>「J/P」</strong>と<strong>「E/I」</strong>が、あなたの情報処理のベクトルを決定しています。
                            </p>
                            
                            <div class="space-y-8">
                                <!-- J/P Switch Explanation -->
                                <div class="bg-slate-950/50 rounded-2xl p-6 border border-slate-800/50">
                                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                        <span class="bg-slate-800 text-sky-400 px-2 py-0.5 rounded text-sm font-mono">${J_or_P}</span> 
                                        外界への態度（判断か知覚か）
                                    </h3>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        あなたのタイプは末尾が「<strong>${J_or_P}</strong>」です。これは外の世界に対してどの機能を使うかを示すスイッチです。
                                        ${jpExplanationText}
                                        <br/>
                                        <span class="mt-2 inline-block px-3 py-1 bg-slate-900 border border-slate-700 rounded-lg text-slate-300">
                                            結果 ➔ 外界に見せる機能は <strong>${outerFaceFunc}</strong> に確定。
                                        </span>
                                    </p>
                                </div>

                                <!-- E/I Switch Explanation -->
                                <div class="bg-slate-950/50 rounded-2xl p-6 border border-slate-800/50">
                                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                        <span class="bg-slate-800 text-sky-400 px-2 py-0.5 rounded text-sm font-mono">${E_or_I}</span> 
                                        エネルギーの向き（主機能の決定）
                                    </h3>
                                    <p class="text-sm text-slate-300 leading-relaxed mb-6">
                                        先頭の文字が「<strong>${E_or_I}（${E_or_I === 'E' ? '外向' : '内向'}型）</strong>」であるため、あなたの一番得意な「主機能」のエネルギーは${E_or_I === 'E' ? '外' : '内'}に向かいます。
                                        ${eiExplanationText}
                                    </p>

                                    <!-- Logic Diagram -->
                                    <div class="flex flex-col items-center justify-center p-4 bg-slate-900 rounded-xl border border-slate-800">
                                        <div class="flex w-full items-center justify-between gap-2 max-w-sm">
                                            <div class="text-center w-1/3">
                                                <span class="text-xs text-slate-500 block mb-2">Inner (内面)</span>
                                                ${getFuncBadgeHTML(E_or_I === 'I' ? f1 : f2, E_or_I === 'I')}
                                                ${E_or_I === 'I' ? '<span class="text-[10px] text-rose-400 font-bold mt-2 block">主機能 (1st)</span>' : ''}
                                            </div>
                                            <div class="flex flex-col items-center flex-1">
                                                <i data-lucide="arrow-right" class="text-slate-600 mb-1 w-6 h-6"></i>
                                                <span class="text-[10px] text-slate-400 font-mono tracking-widest">${E_or_I === 'I' ? '外へ出す顔' : 'そのまま外へ'}</span>
                                            </div>
                                            <div class="text-center w-1/3">
                                                <span class="text-xs text-slate-500 block mb-2">Outer (外界)</span>
                                                ${getFuncBadgeHTML(E_or_I === 'E' ? f1 : f2, E_or_I === 'E')}
                                                ${E_or_I === 'E' ? '<span class="text-[10px] text-sky-400 font-bold mt-2 block">主機能 (1st)</span>' : ''}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Section 4: Stress Behavior -->
                        <section class="bg-rose-950/10 border border-rose-900/40 rounded-3xl p-8 relative overflow-hidden">
                            <div class="absolute -bottom-10 -right-10 opacity-5">
                                <i data-lucide="shield-alert" class="w-64 h-64 text-rose-500"></i>
                            </div>
                            <h2 class="text-rose-400 font-bold tracking-widest uppercase text-sm mb-6 flex items-center gap-2 relative z-10">
                                <i data-lucide="zap" class="w-5 h-5"></i> Section 4: Stress Behavior (-T)
                            </h2>
                            <p class="text-slate-300 text-base mb-8 relative z-10 leading-relaxed">
                                MBTI診断における「-T（慎重型）」は、神経症的傾向（不安の感じやすさ）の高さを表します。強いストレスやプレッシャー下において、健全な機能のバランスが崩れ、システムが暴走を起こす現象を解説します。
                            </p>

                            <div class="space-y-6 relative z-10">
                                <!-- Loop -->
                                <div class="bg-rose-950/30 border border-rose-800/40 rounded-2xl p-6">
                                    <div class="flex items-center gap-3 mb-4">
                                        <i data-lucide="repeat" class="w-6 h-6 text-rose-400"></i>
                                        <h4 class="text-lg font-bold text-rose-200 tracking-wider">ネガティブ反芻 <span class="font-mono text-rose-300">[${f1}-${f3} ループ]</span></h4>
                                    </div>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        外界と内界のバランスを取るための「補助機能（${f2}）」がシャットダウンし、主機能（${f1}）と代替機能（${f3}）の間だけで極端な情報処理をループさせてしまう状態です。<br/><br/>
                                        <strong>【あなたの暴走状態】</strong><br/>
                                        ${loopExplanationText}
                                    </p>
                                </div>

                                <!-- Grip -->
                                <div class="bg-rose-950/30 border border-rose-800/40 rounded-2xl p-6">
                                    <div class="flex items-center gap-3 mb-4">
                                        <i data-lucide="alert-triangle" class="w-6 h-6 text-rose-400"></i>
                                        <h4 class="text-lg font-bold text-rose-200 tracking-wider">劣等機能の爆発 <span class="font-mono text-rose-300">[${f4} グリップ]</span></h4>
                                    </div>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        ストレスが限界値を突破すると、普段は心の最も深い底に抑え込んでいるアキレス腱「劣等機能（${f4}）」が突然コントロールを奪います。普段の長所が完全に裏返り、別人のようになります。<br/><br/>
                                        <strong>【あなたの暴発症状】</strong><br/>
                                        ${functionDetails[f4].bad}<br/>
                                        <span class="block mt-2 text-rose-400/80 text-xs">※その後、本来の主機能が戻ってくると激しく後悔することが多いです。</span>
                                    </p>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            `;
            
            container.classList.remove('hidden');
            
            // LucideアイコンをSVGとして描画（動的に追加されたHTMLに対して）
            lucide.createIcons();
        }

        // --- イベントハンドラ ---
        window.handleSelect = function(type) {
            selectedType = type;
            renderHeader(); // 選択状態のボタンを再描画
            renderDashboard(); // ダッシュボードを描画
            
            // スムーズスクロール
            setTimeout(() => {
                const container = document.getElementById('dashboard-container');
                if(container) {
                    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 50);
        };

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
        });

    </script>
</body>
</html>
