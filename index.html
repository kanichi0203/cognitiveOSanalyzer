    <style>
        html {
            scroll-behavior: smooth;
        }
        /* アニメーション用のカスタムクラス */
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(3rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 20s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-sky-500/30 pb-24 min-h-screen">

        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white mb-4">
            Cognitive OS Analyzer
        </h1>
        <p class="text-lg text-slate-400 mb-10 leading-relaxed">
            MBTIの4文字に隠された、情報の「知覚」と「判断」のメカニズム。<br class="hidden md:block"/>
            ユングの8つの認知機能から、あなたの心のオペレーティングシステムを解読します。<br/>
            以下の16タイプから1つを選択してください。
        </p>

            <!-- ボタンはJavaScriptで生成されます -->
        </div>
    </header>

            INTP: { name: "論理学者", color: "purple", desc: "独自の論理と好奇心で真理を追求する探求者。宇宙の法則から日常の疑問まで、物事の根本的な仕組みを理解しようとします。", growth: "頭の中の理論（Ti）を深めるだけでなく、それを他者に分かりやすく共有し、新しい可能性（Ne）を外部と探求することで視野が劇的に広がります。" },
            ENTJ: { name: "指揮官", color: "purple", desc: "合理性とカリスマで組織を牽引するリーダー。目標達成のためなら困難を恐れず、効率的なシステムを構築して周囲を動かします。", growth: "目標達成の効率（Te）を追求する中で、自分や他者の長期的なビジョンや本当の望み（Ni）に耳を傾けることで、真のリーダーシップが発揮されます。" },
            ENTP: { name: "討論者", color: "purple", desc: "知的な議論と新しい可能性を愛する挑戦者。既存のルールを疑い、斬新なアイデアと鋭い弁舌で世界に刺激を与えます。", growth: "次々と湧き上がるアイデア（Ne）を、論理的な枠組み（Ti）で精査し、一つのことを最後まで形にする経験を積むことで、説得力と実行力が増します。" },
            INFJ: { name: "提唱者", color: "emerald", desc: "深い洞察力で人々の理想を導く導き手。静かですが内に秘めた情熱は熱く、人々の心の本質を見抜き、世界をより良くしようと尽力します。", growth: "内なる理想（Ni）を抱え込まず、他者と共感し合いながら（Fe）現実世界に表現していくことで、あなたの洞察はより多くの人を救う力になります。" },
            INFP: { name: "仲介者", color: "emerald", desc: "内なる価値観と深い共感力を持つ理想主義者。非常に優しく想像力豊かで、他者の痛みに寄り添いながら「自分らしさ」を大切にします。", growth: "自分の深い価値観（Fi）を大切にしながらも、外の世界の多様な可能性（Ne）に触れ、少しずつ現実社会との接点を持つことで、豊かな表現力が開花します。" },
            ENFJ: { name: "主人公", color: "emerald", desc: "人々の情熱を引き出し、共に歩むリーダー。圧倒的な共感力とカリスマ性で人々を励まし、全体の調和と成長をサポートします。", growth: "他者のために尽くす（Fe）だけでなく、自分自身の内なる理想や直観（Ni）にも意識を向け、自己犠牲を減らすことで、より持続可能で強力な影響力を持てます。" },
            ENFP: { name: "広報運動家", color: "emerald", desc: "情熱と想像力で人々を巻き込む自由人。持ち前の明るさと無限のアイデアで、周囲を鼓舞しながら新しい可能性を追求します。", growth: "あふれる好奇心（Ne）を、自分にとって本当に大切な価値観（Fi）のフィルターにかけることで、器用貧乏にならず、あなたにしかできない道を切り拓けます。" },

            ESFJ: { name: "領事", color: "cyan", desc: "調和を大切にし、人々の世話を焼く人気者。常に周囲のニーズに気を配り、みんなが笑顔でいられる温かいコミュニティを築きます。", growth: "全体の調和（Fe）を優先するあまり自分を見失わないよう、事実や伝統（Si）に基づいた地に足の着いた基準を持つことで、より頼りがいのある存在になります。" },
            ISTP: { name: "巨匠", color: "yellow", desc: "冷静な観察眼と実践的な技術を持つ職人。独立心が強く、状況を冷静に分析して、手元にある道具で瞬時に問題を解決します。", growth: "状況を冷静に分析する（Ti）だけでなく、実際に体を動かして現実の刺激に触れる（Se）ことで、あなたの問題解決能力はさらに洗練された職人芸となります。" },
            ISFP: { name: "冒険家", color: "yellow", desc: "柔軟な感性と美意識で今を生きる芸術家。平和を愛し、自分の五感や感情に素直に従いながら、美しいものや楽しい瞬間を味わいます。", growth: "自分の内なる美意識（Fi）を大切にしつつ、五感で感じる現実の体験（Se）を恐れずに取り入れていくことで、より豊かで魅力的な自己表現が可能になります。" },
            ESTP: { name: "起業家", color: "yellow", desc: "エネルギッシュにリスクを楽しみ、行動する実践者。ルールに縛られず、持ち前の度胸と瞬発力で目の前のチャンスを掴み取ります。", growth: "今この瞬間のスリルや行動（Se）を楽しむと同時に、物事の背後にある論理的な構造（Ti）を理解しようとすることで、より戦略的で無敵の実践者になれます。" },
            ESFP: { name: "エンターテイナー", color: "yellow", desc: "持ち前の明るさで今この瞬間を楽しむ天才。周囲をパッと華やかにし、人を楽しませながら自分自身も人生を全力で謳歌します。", growth: "目の前の楽しさ（Se）を味わうだけでなく、自分の本当の気持ちや大切な人への深い思いやり（Fi）に立ち返ることで、単なる人気者を超えた深い魅力が生まれます。" }
        };

        const functionDetails = {
            Se: { name: "外向的感覚", icon: "eye", color: "text-yellow-400", bg: "bg-yellow-400/20", border: "border-yellow-400/50",

                    desc_2: "内界で定めた目標や価値観を現実世界で実現するために、周囲の状況や事実を素早く察知し、実践的な行動を通じてサポートします。",
                    desc_3: "普段は別の機能を使っていますが、リラックスする際や行き詰まった時に、スポーツや趣味などの現実的な体験や物理的な刺激を楽しむことで気分転換を図ります。",
                    desc_4: "普段は「今この瞬間」の現実や五感の刺激を軽視しがちですが、過度なストレス下では衝動的な行動や刹那的な快楽（過食や浪費など）に走る形で暴走することがあります。",
                    growth_3: "考えすぎて行き詰まったら、体を動かしたり、美味しいものを食べたり、物理的な刺激（スポーツや自然など）に触れる時間を作ってください。頭ではなく「体」を使うことで、新しい視点が生まれます。",
                    growth_4: "「今この瞬間を楽しむこと」や「現実の刺激」を無意識に軽視したり恐れたりしていませんか？完璧な計画や深い思考も大切ですが、時には五感で感じるリアルな体験に身を委ねる練習が、あなたの心を驚くほど軽くします。",
                    bad: "衝動的で無計画な行動や、刹那的な快楽（暴飲暴食や浪費、過度な遊びなど）に走り、後先考えずにリスクを取ってしまう。" },
            Si: { name: "内向的感覚", icon: "database", color: "text-emerald-400", bg: "bg-emerald-400/20", border: "border-emerald-400/50",
                    desc_1: "過去の経験や蓄積されたデータを元に、現在を安全かつ確実に行き渡らせます。ルーティンや秩序を非常に重んじ、安定した基盤を築くプロフェッショナルです。",
                    desc_2: "外界へ向かうエネルギーを、過去の経験や細部への注意力で堅実にサポートします。計画の実現に向けて、現実的で着実な手順を提供します。",
                    desc_3: "リラックスしたい時や心が不安定な時に、慣れ親しんだ習慣や懐かしい思い出、お気に入りのルーティンに立ち返ることで安心感を得ます。",
                    desc_4: "普段は詳細な事実や過去の慣習を退屈に感じますが、極度のストレス下では過去の些細な失敗や特定の記憶に過剰に囚われ、身動きが取れなくなることがあります。",
                    growth_3: "新しいことばかり追いかけて疲れた時は、あえて「お気に入りのルーティン」をこなしたり、懐かしい思い出に浸ったり、身の回りを整理整頓してみてください。過去の蓄積があなたに確かな安心感を与えてくれます。",
                    growth_4: "細かい事実の確認や、繰り返しの作業を「退屈だ」「意味がない」と切り捨てないでください。あなたの壮大なアイデアや理想を現実にするためには、この「地味で確実な足場作り」を受け入れることが最大の鍵となります。",
                    bad: "過去の失敗や些細な記憶、人に言われた言葉に過剰に囚われ、ネガティブな反芻を繰り返して新しい変化を極度に恐れる。" },

                    desc_2: "自身の内なる論理や価値観を深めるために、外の世界から多様な視点や新しい選択肢を取り入れ、柔軟で独創的なアプローチを可能にします。",
                    desc_3: "真面目で堅実な日常の合間に、ふとした瞬間に突飛なアイデアを出したり、普段なら選ばないような新しい可能性を遊び心として楽しんだりします。",

                    growth_4: "予測不可能な変化や、明確な答えのない可能性を極度に恐れていませんか？「すべてをコントロールすること」を手放し、時には未知の展開や偶然のひらめきに対して心を開くことで、新しい世界が広がります。",

            Ni: { name: "内向的直観", icon: "target", color: "text-purple-400", bg: "bg-purple-400/20", border: "border-purple-400/50",

                    desc_4: "普段は「今この瞬間」の現実を重視しますが、ストレス下では突然、未来に対する根拠のない絶望感や「裏切られるのではないか」というパラノイアに囚われます。",

        // --- 状態管理 ---

        // --- ロジック関数 ---
        const getCognitiveStack = (type) => {
            const [e_i, s_n, t_f, j_p] = type.split("");
            
            const extFunc = j_p === 'J' ? `${t_f}e` : `${s_n}e`;
            const introFunc = j_p === 'J' ? `${s_n}i` : `${t_f}i`;

            const func1 = e_i === 'E' ? extFunc : introFunc;
            const func2 = e_i === 'E' ? introFunc : extFunc;

            const func3_base = func2[0] === 'S' ? 'N' : func2[0] === 'N' ? 'S' : func2[0] === 'T' ? 'F' : 'T';
            const func3_dir = func2[1] === 'e' ? 'i' : 'e';
            const func3 = `${func3_base}${func3_dir}`;

            const func4_base = func1[0] === 'S' ? 'N' : func1[0] === 'N' ? 'S' : func1[0] === 'T' ? 'F' : 'T';
            const func4_dir = func1[1] === 'e' ? 'i' : 'e';
            const func4 = `${func4_base}${func4_dir}`;

            return [func1, func2, func3, func4];
        };

                                    </p>
                                </div>
                            </div>
                        </section>

                        <!-- Section 5: Growth & Development -->
                        <section class="bg-emerald-950/10 border border-emerald-900/40 rounded-3xl p-8 relative overflow-hidden">
                            <div class="absolute -bottom-10 -right-10 opacity-5">
                                <i data-lucide="trending-up" class="w-64 h-64 text-emerald-500"></i>
                            </div>
                            <h2 class="text-emerald-400 font-bold tracking-widest uppercase text-sm mb-6 flex items-center gap-2 relative z-10">
                                <i data-lucide="compass" class="w-5 h-5"></i> Section 5: Growth & Development
                            </h2>
                            <p class="text-slate-300 text-base mb-8 relative z-10 leading-relaxed">
                                あなたの性質を深く理解し、脳力を最大限に伸ばしていくための道標です。<br/>
                                強みを生かしつつ、見落としがちな機能とどう向き合うかが自己成長の鍵となります。
                            </p>

                            <div class="space-y-6 relative z-10">
                                <!-- 全体的アドバイス -->
                                <div class="bg-emerald-950/30 border border-emerald-800/40 rounded-2xl p-6">
                                    <h4 class="text-lg font-bold text-emerald-200 tracking-wider mb-3">あなたへの成長アドバイス</h4>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        ${profile.growth}
                                    </p>
                                </div>

                                <!-- 代替機能（3rd）の育て方 -->
                                <div class="bg-slate-900/80 border border-slate-700/80 rounded-2xl p-6">
                                    <h4 class="text-lg font-bold text-sky-300 tracking-wider mb-3 flex items-center gap-2">
                                        代替機能 <span class="font-mono text-sky-400">[3rd: ${f3}]</span> の育て方
                                    </h4>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        ${functionDetails[f3].growth_3}
                                    </p>
                                </div>

                                <!-- 劣等機能（4th）との付き合い方 -->
                                <div class="bg-slate-900/80 border border-slate-700/80 rounded-2xl p-6">
                                    <h4 class="text-lg font-bold text-rose-300 tracking-wider mb-3 flex items-center gap-2">
                                        劣等機能 <span class="font-mono text-rose-400">[4th: ${f4}]</span> との付き合い方
                                    </h4>
                                    <p class="text-sm text-slate-300 leading-relaxed">
                                        ${functionDetails[f4].growth_4}
                                    </p>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            `;
            
            container.classList.remove('hidden');
            
            // LucideアイコンをSVGとして描画
            lucide.createIcons();
        }

        // --- イベントハンドラ ---
        window.handleSelect = function(type) {
            selectedType = type;
            renderHeader(); // 選択状態のボタンを再描画
            renderDashboard(); // ダッシュボードを描画
            
            // スムーズスクロール
            setTimeout(() => {
                const container = document.getElementById('dashboard-container');
                if(container) {
                    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 50);
        };

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
        });

    </script>
</body>
</html>
